<div class="p-4 bg-white rounded shadow border mt-4">
  {% for message in messages %}
    <p class="text-green-700 font-medium">{{ message|safe }}</p>
  {% endfor %}

  {% if transcript %}
    <div class="mt-4">
      <h3 class="font-semibold text-gray-800">Transcript:</h3>
      <pre class="whitespace-pre-wrap text-sm bg-gray-50 p-2 mt-1 border">{{ transcript }}</pre>
      <form 
      hx-post="{% url 'translate_transcript' %}" 
      hx-target="#translated-container" 
      hx-swap="innerHTML"
      class="mt-4 space-y-2"
    >
      {% csrf_token %}
      <input type="hidden" name="original_text" value="{{ transcript }}">
      <label class="block text-sm font-medium text-gray-700">Choose Language:</label>
      <select name="language" class="border p-1 rounded w-full">
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="zh">Chinese</option>
        <option value="ar">Arabic</option>
        <option value="ru">Russian</option>
        <option value="yo">Yoruba</option>
      </select>
      <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded">Translate</button>
    </form>
    </div>
  {% endif %}
  <div id="translated-container" class="mt-4"></div>
</div>
